version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: repoguardian-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://localhost:27017/repoguardian}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: repoguardian-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    command: npm run dev
